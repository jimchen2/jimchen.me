name: Build and Push Docker Image

on:
  push:
    branches:
      - master
      
jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read # To checkout the repo
      packages: write # If pushing to GitHub Container Registry (ghcr.io) - not needed for Docker Hub

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          # For GitHub Container Registry (ghcr.io) instead of Docker Hub, use:
          # registry: ghcr.io
          # username: ${{ github.actor }}
          # password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta # Give an ID to this step to reference its outputs
        uses: docker/metadata-action@v5
        with:
          images: jimchen2/jimchen.me # Your Docker Hub image name
          tags: |
            type=schedule
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha
            type=raw,value=latest,enable={{is_default_branch}} # Explicitly add latest tag for default branch

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile # Path to your Dockerfile
          push: ${{ github.event_name != 'pull_request' }} # Only push if not a pull request
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          no-cache: ${{ github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main' }} # Enforce --no-cache for main branch pushes or manual triggers